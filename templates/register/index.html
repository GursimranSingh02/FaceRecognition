<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Face</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-950">
  <main class="mx-auto w-full max-w-5xl px-6 py-8">
    <nav class="mb-8 flex items-center justify-between">
      <a href="/" class="text-sm font-medium text-zinc-600 hover:text-zinc-950">Back</a>
      <a href="/detect" class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium hover:bg-white">Detect Face</a>
    </nav>

    <section class="grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
      <div class="space-y-3">
        <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">Register</p>
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">Enroll a new face</h1>
        <p class="text-zinc-600">Enter the person name, upload a photo or capture one with the camera, then submit it for enrollment.</p>
      </div>

      <form id="registerForm" class="rounded-lg border border-zinc-200 bg-white p-5 shadow-sm">
        <div class="space-y-5">
          <label class="block">
            <span class="text-sm font-medium text-zinc-800">Person name</span>
            <input
              id="personName"
              name="person_name"
              type="text"
              required
              class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2 outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100"
              placeholder="Enter name"
            >
          </label>

          <label class="block">
            <span class="text-sm font-medium text-zinc-800">Upload photo</span>
            <input
              id="fileInput"
              name="file"
              type="file"
              accept="image/*"
              class="mt-2 block w-full text-sm text-zinc-700 file:mr-4 file:rounded-md file:border-0 file:bg-zinc-900 file:px-4 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-zinc-700"
            >
          </label>

          <div class="space-y-3">
            <div class="aspect-video overflow-hidden rounded-lg border border-zinc-200 bg-zinc-100">
              <video id="cameraPreview" class="h-full w-full object-cover" autoplay playsinline muted></video>
              <canvas id="photoCanvas" class="hidden"></canvas>
            </div>
            <div class="flex flex-wrap gap-3">
              <button type="button" id="startCamera" class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium hover:bg-zinc-50">Open Camera</button>
              <button type="button" id="capturePhoto" class="rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">Capture Photo</button>
            </div>
            <p id="captureStatus" class="text-sm text-zinc-600"></p>
          </div>

          <button type="submit" class="w-full rounded-md bg-zinc-950 px-4 py-3 text-sm font-semibold text-white hover:bg-zinc-800">Register Face</button>
        </div>

        <pre id="result" class="mt-5 hidden whitespace-pre-wrap rounded-lg border border-zinc-200 bg-zinc-50 p-4 text-sm text-zinc-800"></pre>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("registerForm");
    const fileInput = document.getElementById("fileInput");
    const result = document.getElementById("result");
    const video = document.getElementById("cameraPreview");
    const canvas = document.getElementById("photoCanvas");
    const startCamera = document.getElementById("startCamera");
    const capturePhoto = document.getElementById("capturePhoto");
    const captureStatus = document.getElementById("captureStatus");
    let capturedBlob = null;
    let cameraStream = null;

    function showResult(data, isError = false) {
      result.classList.remove("hidden");
      result.classList.toggle("border-red-200", isError);
      result.classList.toggle("bg-red-50", isError);
      result.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    startCamera.addEventListener("click", async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = cameraStream;
        captureStatus.textContent = "Camera is ready.";
      } catch (error) {
        showResult("Unable to open camera: " + error.message, true);
      }
    });

    capturePhoto.addEventListener("click", async () => {
      if (!video.srcObject) {
        showResult("Open the camera before capturing a photo.", true);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
      capturedBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.95));
      fileInput.value = "";
      captureStatus.textContent = "Photo captured and ready to submit.";
    });

    fileInput.addEventListener("change", () => {
      capturedBlob = null;
      captureStatus.textContent = fileInput.files.length ? "Uploaded photo selected." : "";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const personName = document.getElementById("personName").value.trim();
      const selectedFile = fileInput.files[0];
      const imageFile = capturedBlob || selectedFile;

      if (!personName) {
        showResult("Person name is required.", true);
        return;
      }

      if (!imageFile) {
        showResult("Upload a photo or capture one with the camera.", true);
        return;
      }

      const formData = new FormData();
      formData.append("person_name", personName);
      formData.append("file", imageFile, "register-face.jpg");

      try {
        showResult("Submitting...");
        const response = await fetch("/api/v1/face/enroll", {
          method: "POST",
          body: formData,
        });
        const data = await response.json();
        showResult(data, !response.ok);
      } catch (error) {
        showResult("Request failed: " + error.message, true);
      }
    });
  </script>
</body>
</html>
